{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Comfort Hotel KG{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header class="site-header">
        <div class="container header-row">
            <a href="{% url 'core:home' %}" class="logo">Comfort Hotel KG</a>

<nav class="nav">
    <a href="{% url 'core:home' %}">Главная</a>
    <a href="{% url 'rooms:room_list' %}">Номера</a>
    <a href="{% url 'bookings:booking_create' %}">Бронирование</a>
    <a href="{% url 'contacts:contact' %}">Контакты</a>
</nav>

        </div>
    </header>

    <main class="main-content container">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container footer-row">
            <div>© 2026 Comfort Hotel KG</div>
            <div>Бишкек</div>
        </div>
    </footer>
</body>
</html>
